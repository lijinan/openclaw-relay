server:
  port: 8080

spring:
  application:
    name: openclaw-relay
  profiles:
    active: dev 

openclaw:
  relay:
    bus:
      type: memory
      key-prefix: openclaw:relay
      request-ttl-seconds: 300
      response-ttl-seconds: 300
      poll-timeout-ms: 1000
      processor-fixed-delay-ms: 50
    clients:
      openclaw-local: "your-auth-token-here"

logging:
  level:
    root: INFO
    com.openclaw.relay: INFO
